<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f0e17"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Listing Lists</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;600;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0e17;--surface:#1a1828;--surface2:#231f35;--accent:#ff6b35;--accent2:#f7c59f;--green:#4ecb71;--text:#fffffe;--muted:#a7a9be;--border:rgba(255,255,255,0.08);--radius:18px;--shadow:0 8px 32px rgba(0,0,0,0.4)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;top:-30%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(255,107,53,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(78,203,113,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.screen{display:none;min-height:100vh;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column}
#auth-screen{align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:420px;animation:slideUp .6s cubic-bezier(.16,1,.3,1)}
.logo-wrap{text-align:center;margin-bottom:48px}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:22px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;box-shadow:0 12px 40px rgba(255,107,53,.35);animation:float 3s ease-in-out infinite}
.logo-title{font-family:'Fraunces',serif;font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--text) 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{color:var(--muted);font-size:14px;margin-top:6px;font-weight:300}
.tab-switcher{display:flex;background:var(--surface);border-radius:var(--radius);padding:4px;margin-bottom:28px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:10px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border-radius:calc(var(--radius) - 4px);cursor:pointer;transition:all .25s}
.tab-btn.active{background:var(--accent);color:white;box-shadow:0 4px 16px rgba(255,107,53,.4)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.form-input{width:100%;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.15)}
.form-input::placeholder{color:var(--muted);opacity:.5}
.btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#ff8c5a);border:none;border-radius:12px;color:white;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;margin-top:8px;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(255,107,53,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(255,107,53,.45)}
.btn-primary:active{transform:translateY(0)}
.error-msg{background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.3);color:#ff8080;padding:12px 16px;border-radius:10px;font-size:14px;margin-top:12px;display:none}
.error-msg.show{display:block;animation:shake .3s}
#app-screen{padding:0}
.app-header{padding:20px 20px 12px;position:sticky;top:0;z-index:100;background:linear-gradient(to bottom,var(--bg) 80%,transparent)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header-logo{font-family:'Fraunces',serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-family{display:flex;align-items:center;gap:8px}
.family-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--accent2);font-weight:500}
.icon-btn{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:50%;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.icon-btn:hover{color:var(--text);border-color:var(--accent)}
.stats-row{display:flex;gap:10px}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.stat-pill span{color:var(--text);font-weight:500}
.add-bar{padding:8px 20px 16px;position:sticky;bottom:0;z-index:100;background:linear-gradient(to top,var(--bg) 70%,transparent)}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow)}
.add-main-row{display:flex;gap:8px}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.add-input:focus{border-color:var(--accent)}
.add-input::placeholder{color:var(--muted);opacity:.5}
.add-extras{display:flex;gap:8px}
.add-qty{width:70px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.add-cat-wrap{flex:1;position:relative}
.add-cat-btn{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:4px;transition:border-color .2s}
.add-cat-btn:focus,.add-cat-btn.open{border-color:var(--accent)}
.add-cat-arrow{flex-shrink:0;transition:transform .2s;color:var(--muted)}
.add-cat-btn.open .add-cat-arrow{transform:rotate(180deg)}
.add-cat-dropdown{position:absolute;bottom:calc(100% + 6px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:200;box-shadow:var(--shadow);max-height:220px;overflow-y:auto;display:none}
.add-cat-dropdown.open{display:block;animation:slideUp .15s cubic-bezier(.16,1,.3,1)}
.add-cat-option{padding:10px 14px;font-size:14px;cursor:pointer;color:var(--text);transition:background .15s;display:flex;align-items:center;gap:8px}
.add-cat-option:hover{background:rgba(255,107,53,.12)}
.add-cat-option.selected{color:var(--accent)}
.add-cat-option.new-cat{color:var(--accent2);border-top:1px solid var(--border);font-style:italic}
.add-nick{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.add-submit{width:46px;height:46px;background:var(--accent);border:none;border-radius:10px;color:white;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s;flex-shrink:0}
.add-submit:hover{transform:scale(1.05);background:#ff8c5a}
.add-submit:active{transform:scale(.95)}
/* Category header action buttons */
.category-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.category-label-text{flex:1;display:flex;align-items:center;gap:6px}
.category-label-text::after{content:'';flex:1;height:1px;background:var(--border)}
.cat-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.cat-btn{width:26px;height:26px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;padding:0;transition:background .15s,color .15s}
.cat-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.cat-btn.del:hover{background:rgba(255,80,80,.15);color:#ff8080}
.cat-btn svg{width:14px;height:14px;flex-shrink:0}
/* Drag and drop */
.item-card{cursor:grab}
.item-card.dragging{opacity:.4;cursor:grabbing}
.item-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,107,53,.3)}
.drop-zone{height:4px;border-radius:4px;background:var(--accent);opacity:0;transition:opacity .15s;margin-bottom:8px}
.drop-zone.active{opacity:1}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:400;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:360px;transform:translateY(16px) scale(.97);transition:transform .25s cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow)}
.modal-overlay.open .modal-card{transform:none}
.modal-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:20px}
.modal-group{margin-bottom:14px}
.modal-label{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:block}
.modal-input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.modal-input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btn{flex:1;padding:13px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s}
.modal-btn.cancel{background:var(--surface2);color:var(--muted)}
.modal-btn.cancel:hover{color:var(--text)}
.modal-btn.confirm{background:var(--accent);color:white;box-shadow:0 4px 16px rgba(255,107,53,.35)}
.modal-btn.confirm:hover{background:#ff8c5a}
.list-content{flex:1;padding:0 20px;overflow-y:auto;padding-bottom:8px}
.filter-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;flex-wrap:nowrap}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:white}
.clear-checked-btn{padding:7px 16px;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.2);border-radius:20px;color:#ff8080;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.clear-checked-btn:hover{background:rgba(255,80,80,.2)}
.category-group{margin-bottom:24px}
/* category-label defined above with .cat-actions */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:all .25s cubic-bezier(.16,1,.3,1);animation:itemIn .35s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:3px 0 0 3px;transform:scaleY(0);transition:transform .2s}
.item-card:hover::before{transform:scaleY(1)}
.item-card.checked{opacity:.45}
.item-card.checked .item-name{text-decoration:line-through}
.item-check{width:24px;height:24px;border:2px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:13px}
.item-check:hover{border-color:var(--green)}
.item-card.checked .item-check{background:var(--green);border-color:var(--green);color:white}
.item-info{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:8px}
.item-qty-badge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px 10px;font-size:12px;color:var(--accent2);font-weight:500;flex-shrink:0}
.item-delete{width:30px;height:30px;background:none;border:none;color:var(--muted);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .2s;font-size:15px}
.item-card:hover .item-delete{opacity:1}
.item-delete:hover{background:rgba(255,80,80,.15);color:#ff8080}
.empty-state{text-align:center;padding:60px 20px;display:none}
.empty-state.show{display:block}
.empty-icon{font-size:56px;margin-bottom:16px;animation:float 2.5s ease-in-out infinite}
.empty-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin-bottom:8px}
.empty-sub{color:var(--muted);font-size:14px}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.loading-overlay.hidden{display:none}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{color:var(--muted);font-size:14px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:14px;color:var(--text);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none;z-index:500;white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinning{animation:spin .8s linear infinite}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes itemIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text">Loading…</div></div>
<div class="toast" id="toast"></div>

<div class="screen active" id="auth-screen">
  <div class="auth-card">
    <div class="logo-wrap">
      <img src="icon-192.png" alt="Listing Lists" style="width:72px;height:72px;border-radius:22px;box-shadow:0 12px 40px rgba(255,107,53,.35);display:inline-flex;margin-bottom:16px;"/>
      <div class="logo-title">Listing Lists</div>
      <div class="logo-sub">Your family's shared grocery list</div>
    </div>
    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('create')">Create Family</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label class="form-label">Family Name</label><input class="form-input" id="login-name" placeholder="The Smiths" type="text" autocomplete="off"/></div>
      <div class="form-group"><label class="form-label">Passcode</label><input class="form-input" id="login-pass" placeholder="••••••" type="password" onkeydown="if(event.key==='Enter')login()"/></div>
      <button class="btn-primary" onclick="login()">Sign In →</button>
      <div class="error-msg" id="login-error"></div>
    </div>
    <div id="create-form" style="display:none">
      <div class="form-group"><label class="form-label">Family Name</label><input class="form-input" id="create-name" placeholder="The Smiths" type="text" autocomplete="off"/></div>
      <div class="form-group"><label class="form-label">Passcode</label><input class="form-input" id="create-pass" placeholder="Choose a passcode" type="password" onkeydown="if(event.key==='Enter')createFamily()"/></div>
      <button class="btn-primary" onclick="createFamily()">Create Family →</button>
      <div class="error-msg" id="create-error"></div>
    </div>
  </div>
</div>

<div class="screen" id="app-screen">
  <div class="app-header">
    <div class="header-top">
      <div class="header-logo">Listing Lists</div>
      <div class="header-family">
        <div class="family-badge" id="family-badge">Family</div>
        <button class="icon-btn" id="refresh-btn" onclick="refreshList()" title="Refresh">↻</button>
        <button class="icon-btn" onclick="logout()" title="Sign out">✕</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-pill">🧺 Total: <span id="stat-total">0</span></div>
      <div class="stat-pill">✅ Done: <span id="stat-done">0</span></div>
      <div class="stat-pill">📋 Left: <span id="stat-left">0</span></div>
    </div>
  </div>

  <div class="list-content">
    <div class="filter-row" id="filter-row">
      <button class="filter-chip active" data-cat="all" onclick="setFilter('all')">All</button>
      <button class="clear-checked-btn" onclick="clearChecked()">Clear checked</button>
    </div>
    <div id="items-list"></div>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🛍️</div>
      <div class="empty-title">List is empty</div>
      <div class="empty-sub">Add something below to get started</div>
    </div>
  </div>

  <div class="add-bar">
    <div class="add-form">
      <div class="add-main-row">
        <input class="add-input" id="add-item" placeholder="Add an item…" type="text" onkeydown="if(event.key==='Enter')addItem()"/>
        <button class="add-submit" onclick="addItem()">+</button>
      </div>
      <div class="add-extras">
        <input class="add-qty" id="add-qty" placeholder="Qty" type="number" min="1" value="1"/>
        <div class="add-cat-wrap" id="cat-wrap">
          <button class="add-cat-btn" id="cat-btn" type="button" onclick="toggleCatDropdown()">
            <span id="cat-btn-label">Other</span>
            <svg class="add-cat-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 6 8 10 12 6"/></svg>
          </button>
          <div class="add-cat-dropdown" id="cat-dropdown"></div>
        </div>
        <input class="add-nick" id="add-nick" placeholder="Your name" type="text" oninput="saveNick()"/>
      </div>
    </div>
  </div><!-- end add-bar -->
</div><!-- end app-screen -->

<!-- Generic modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal-card" id="modal-card">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn confirm" id="modal-confirm">OK</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ── Firebase Config & Init ───────────────────────────────────────────────────
const firebaseConfig={apiKey:"AIzaSyDFChem-HuTxBmbVvope73X_eQbUd9ngbM",authDomain:"listing-lists.firebaseapp.com",projectId:"listing-lists",storageBucket:"listing-lists.firebasestorage.app",messagingSenderId:"1041641242612",appId:"1:1041641242612:web:7f40506f0cb3b15e8383a1",measurementId:"G-SFEXGEHVJ9"};
console.log('🔧 Initializing Firebase...');
console.log('Config:', firebaseConfig);
firebase.initializeApp(firebaseConfig);
console.log('✅ Firebase initialized');
const auth=firebase.auth();
const db=firebase.firestore();
console.log('✅ Auth and Firestore ready');
console.log('Auth object:', auth);
console.log('Current auth settings:', {currentUser: auth.currentUser, persistence: auth.persistence});

// ── Helper functions (defined early so they can be used) ──────────────────────
function catEmoji(c){return{Produce:'🥦',Dairy:'🥛',Meat:'🥩',Bakery:'🍞',Frozen:'🧊',Snacks:'🍿',Drinks:'🥤',Household:'🧹',Other:'📦'}[c]||'📦';}
function timeAgo(iso){const d=Date.now()-new Date(iso);if(d<60000)return'just now';if(d<3600000)return`${Math.floor(d/60000)}m ago`;if(d<86400000)return`${Math.floor(d/3600000)}h ago`;return`${Math.floor(d/86400000)}d ago`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');}
function val(id){return document.getElementById(id)?.value||'';}
function hide(id){const el=document.getElementById(id);if(el)el.style.display='none';}
let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);}
function showError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),4000);}

let currentUser=null,familyName=null,items=[],activeFilter="all";

// ── Category order ───────────────────────────────────────────────────────────
const DEFAULT_CATS=['Produce','Dairy','Meat','Bakery','Frozen','Snacks','Drinks','Household','Other'];
let categoryOrder=JSON.parse(localStorage.getItem('ll_cat_order')||'null')||[...DEFAULT_CATS];
let selectedCat=categoryOrder[0]||'Other';
function saveCatOrder(){
  localStorage.setItem('ll_cat_order',JSON.stringify(categoryOrder));
  if(currentUser&&familyName){
    db.collection('families').doc(familyName).update({categoryOrder}).catch(e=>console.error(e));
  }
}

// ── Nick (sender name) ───────────────────────────────────────────────────────
function saveNick(){const v=document.getElementById('add-nick').value;if(v)localStorage.setItem('ll_nick',v);}
function loadNick(){const n=localStorage.getItem('ll_nick');if(n){const el=document.getElementById('add-nick');if(el)el.value=n;}}

// ── Custom category dropdown ─────────────────────────────────────────────────
function buildCatDropdown(){
  const dd=document.getElementById('cat-dropdown');
  dd.innerHTML='';
  categoryOrder.forEach(cat=>{
    const opt=document.createElement('div');
    opt.className='add-cat-option'+(cat===selectedCat?' selected':'');
    opt.innerHTML=catEmoji(cat)+' '+esc(cat);
    opt.onclick=()=>selectCat(cat);
    dd.appendChild(opt);
  });
  const newOpt=document.createElement('div');
  newOpt.className='add-cat-option new-cat';
  newOpt.innerHTML='\uFF0B New category';
  newOpt.onclick=()=>{closeCatDropdown();promptNewCategory();};
  dd.appendChild(newOpt);
}
function toggleCatDropdown(){
  const dd=document.getElementById('cat-dropdown');
  const btn=document.getElementById('cat-btn');
  const isOpen=dd.classList.contains('open');
  if(isOpen){closeCatDropdown();}else{buildCatDropdown();dd.classList.add('open');btn.classList.add('open');}
}
function closeCatDropdown(){
  document.getElementById('cat-dropdown').classList.remove('open');
  document.getElementById('cat-btn').classList.remove('open');
}
function selectCat(cat){
  selectedCat=cat;
  document.getElementById('cat-btn-label').textContent=cat;
  closeCatDropdown();
}
document.addEventListener('click',e=>{
  const wrap=document.getElementById('cat-wrap');
  if(wrap&&!wrap.contains(e.target))closeCatDropdown();
});
function promptNewCategory(){
  openModal('New Category',
    '<div class="modal-group"><label class="modal-label">Category Name</label><input class="modal-input" id="modal-newcat" placeholder="e.g. Beverages" type="text"/></div>',
    async ()=>{
      const name=document.getElementById('modal-newcat').value.trim();
      if(!name)return;
      if(!categoryOrder.includes(name)){categoryOrder.push(name);saveCatOrder();}
      selectCat(name);buildCatDropdown();renderItems();closeModal();
    }
  );
  setTimeout(()=>document.getElementById('modal-newcat')?.focus(),50);
}

// ── Modal helpers ────────────────────────────────────────────────────────────
function openModal(title,bodyHTML,onConfirm){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHTML;
  document.getElementById('modal-confirm').onclick=onConfirm;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

window.addEventListener('load',()=>{
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
  loadNick();
  buildCatDropdown();
  document.getElementById('cat-btn-label').textContent=selectedCat;
  
  // Setup auth listener
  auth.onAuthStateChanged(async(user)=>{
    console.log('🔐 Auth state changed:', user?.email || 'not logged in');
    if(user){
      currentUser=user;
      familyName=localStorage.getItem('ll_family')||user.uid;
      console.log('👤 User logged in:', user.email, 'Family:', familyName);
      showApp();
      await loadItems();
    }else{
      console.log('👤 No user logged in');
      hide('loading');
      document.getElementById('auth-screen').classList.add('active');
      document.getElementById('app-screen').classList.remove('active');
    }
  });});

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(tab==='login'&&i===0)||(tab==='create'&&i===1)));
  document.getElementById('login-form').style.display=tab==='login'?'':'none';
  document.getElementById('create-form').style.display=tab==='create'?'':'none';
}

async function login(){
  const name=val('login-name'),pass=val('login-pass');
  if(!name||!pass)return showError('login-error','Fill in all fields');
  const email=name+'@listing-lists.local';
  try{
    console.log('📧 Logging in as:', email);
    console.log('Auth state before login:', {authDomain: auth.auth.config.authDomain, apiKey: auth.auth.config.apiKey});
    await auth.signInWithEmailAndPassword(email,pass);
    console.log('✅ Login successful');
  }catch(e){
    console.error('❌ Login error:', e);
    console.error('Full error object:', {code: e.code, message: e.message, customData: e.customData});
    showError('login-error',e.message);
  }
}

async function createFamily(){
  const name=val('create-name'),pass=val('create-pass');
  if(!name||!pass)return showError('create-error','Fill in all fields');
  const email=name+'@listing-lists.local';
  try{
    console.log('👨‍👩‍👧‍👦 Creating family:', name);
    const res=await auth.createUserWithEmailAndPassword(email,pass);
    console.log('✅ User created:', res.user.uid);
    const DEFAULT_CATS=['Produce','Dairy','Meat','Bakery','Frozen','Snacks','Drinks','Household','Other'];
    console.log('💾 Creating family document...');
    await db.collection('families').doc(name).set({owner:res.user.uid,members:[res.user.uid],categoryOrder:DEFAULT_CATS,createdAt:new Date()});
    console.log('✅ Family created');
    localStorage.setItem('ll_family',name);
    familyName=name;
  }catch(e){
    console.error('❌ Create error:', e);
    showError('create-error',e.message);
  }
}

function logout(){
  auth.signOut().then(()=>{
    currentUser=null;
    familyName=null;
    localStorage.removeItem('ll_family');
    items=[];
    document.getElementById('auth-screen').classList.add('active');
    document.getElementById('app-screen').classList.remove('active');
  });
}

function showApp(){
  document.getElementById('auth-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('family-badge').textContent=familyName;
  hide('loading');
}

async function loadItems(){
  try{
    console.log('📥 Loading items for family:', familyName);
    const snap=await db.collection('families').doc(familyName).collection('items').orderBy('order','asc').get();
    items=snap.docs.map(doc=>({id:doc.id,...doc.data()}));
    console.log('✅ Loaded', items.length, 'items');
    const familySnap=await db.collection('families').doc(familyName).get();
    if(familySnap.exists()&&familySnap.data().categoryOrder){
      categoryOrder=familySnap.data().categoryOrder;
      console.log('✅ Categories:', categoryOrder);
    }
    renderItems();
  }catch(e){
    console.error('❌ Error loading items:', e);
  }
}

async function addItem(){
  const name=val('add-item').trim();
  if(!name)return;
  const qty=parseInt(val('add-qty'))||1,category=selectedCat,addedBy=val('add-nick')||'Someone';
  try{
    console.log('➕ Adding item:', name, 'to', category);
    const docRef=await db.collection('families').doc(familyName).collection('items').add({
      name,qty,category,addedBy,checked:false,createdAt:new Date(),addedAt:new Date(),order:items.length
    });
    console.log('✅ Item added with ID:', docRef.id);
    items.push({id:docRef.id,name,qty,category,addedBy,checked:false,createdAt:new Date(),addedAt:new Date()});
    document.getElementById('add-item').value='';
    document.getElementById('add-qty').value=1;
    if(!categoryOrder.includes(category)){categoryOrder.push(category);saveCatOrder();}
    buildCatDropdown();renderItems();toast('Added '+name);
  }catch(e){
    console.error('❌ Failed to add item:', e);
    toast('Failed to add item: '+e.message);
  }
}

function promptAddToCategory(cat){
  openModal('Add to '+cat,
    '<div class="modal-group"><label class="modal-label">Item Name</label><input class="modal-input" id="modal-item" placeholder="e.g. Milk" type="text"/></div>'+
    '<div class="modal-group"><label class="modal-label">Quantity</label><input class="modal-input" id="modal-qty" type="number" min="1" value="1"/></div>',
    async ()=>{
      const name=document.getElementById('modal-item').value.trim();
      if(!name)return;
      const qty=parseInt(document.getElementById('modal-qty').value)||1;
      const addedBy=val('add-nick')||'Someone';
      closeModal();
      try{
        await db.collection('families').doc(familyName).collection('items').add({name,qty,category:cat,addedBy,checked:false,createdAt:new Date(),addedAt:new Date(),order:items.length});
        await loadItems();
        toast('Added '+name);
      }catch(e){toast('Failed to add item: '+e.message);}
    }
  );
  setTimeout(()=>document.getElementById('modal-item')?.focus(),50);
}

async function toggleItem(id){
  try{
    const item=items.find(i=>i.id===id);
    if(item){
      const newChecked=!item.checked;
      await db.collection('families').doc(familyName).collection('items').doc(id).update({checked:newChecked});
      item.checked=newChecked;
      renderItems();
    }
  }catch(e){console.error('Error toggling item:',e);}
}

async function deleteItem(id){
  try{
    await db.collection('families').doc(familyName).collection('items').doc(id).delete();
    items=items.filter(i=>i.id!==id);
    renderItems();
    toast('Removed');
  }catch(e){console.error('Error deleting item:',e);}
}

async function clearChecked(){
  try{
    const checked=items.filter(i=>i.checked);
    for(const item of checked){
      await db.collection('families').doc(familyName).collection('items').doc(item.id).delete();
    }
    items=items.filter(i=>!i.checked);
    renderItems();
    toast('Cleared checked items');
  }catch(e){console.error('Error clearing checked:',e);}
}

async function refreshList(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  await loadItems();
  setTimeout(()=>btn.classList.remove('spinning'),600);
}

function setFilter(cat){
  activeFilter=cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.cat===cat));
  renderItems();
}

// ── Category ordering ────────────────────────────────────────────────────────
function moveCatUp(cat){
  const idx=categoryOrder.indexOf(cat);
  if(idx<=0)return;
  [categoryOrder[idx-1],categoryOrder[idx]]=[categoryOrder[idx],categoryOrder[idx-1]];
  saveCatOrder();buildCatDropdown();renderItems();
}
function moveCatDown(cat){
  const idx=categoryOrder.indexOf(cat);
  if(idx<0||idx>=categoryOrder.length-1)return;
  [categoryOrder[idx+1],categoryOrder[idx]]=[categoryOrder[idx],categoryOrder[idx+1]];
  saveCatOrder();buildCatDropdown();renderItems();
}
function confirmDeleteCategory(cat){
  openModal('Delete Category',
    '<p style="color:var(--muted);font-size:14px">Are you sure you want to delete the <strong style="color:var(--text)">'+esc(cat)+'</strong> category?<br><br>Items inside it will be moved to <strong style="color:var(--accent2)">Other</strong>.</p>',
    async ()=>{
      const affected=items.filter(i=>i.category===cat);
      for(const item of affected){
        try{
          await db.collection('families').doc(familyName).collection('items').doc(item.id).update({category:'Other'});
          item.category='Other';
        }catch(e){console.error(e);}
      }
      categoryOrder=categoryOrder.filter(c=>c!==cat);
      if(!categoryOrder.includes('Other'))categoryOrder.push('Other');
      saveCatOrder();
      if(selectedCat===cat){selectedCat='Other';document.getElementById('cat-btn-label').textContent='Other';}
      if(activeFilter===cat)activeFilter='all';
      buildCatDropdown();renderItems();closeModal();toast('Category deleted');
    }
  );
}

// ── Drag and drop ─────────────────────────────────────────────────────────────
let dragItem=null,dragFromCat=null;
function makeDraggable(card,item){
  card.draggable=true;
  card.addEventListener('dragstart',e=>{
    dragItem=item;dragFromCat=item.category;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',String(item.id));
  });
  card.addEventListener('dragend',()=>{
    card.classList.remove('dragging');
    document.querySelectorAll('.item-card.drag-over').forEach(c=>c.classList.remove('drag-over'));
    dragItem=null;dragFromCat=null;
  });
  card.addEventListener('dragover',e=>{
    e.preventDefault();e.dataTransfer.dropEffect='move';
    document.querySelectorAll('.item-card.drag-over').forEach(c=>c.classList.remove('drag-over'));
    if(dragItem&&item.id!==dragItem.id)card.classList.add('drag-over');
  });
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    if(!dragItem||item.id===dragItem.id)return;
    const fromIdx=items.findIndex(i=>i.id===dragItem.id);
    const toIdx=items.findIndex(i=>i.id===item.id);
    if(fromIdx<0||toIdx<0)return;
    const moved=items.splice(fromIdx,1)[0];
    const oldCat=moved.category;
    moved.category=item.category;
    items.splice(toIdx,0,moved);
    renderItems();saveItemOrder();
    if(moved.category!==oldCat)db.collection('families').doc(familyName).collection('items').doc(moved.id).update({category:moved.category}).catch(()=>{});
  });
}
function makeCatDropTarget(groupEl,cat){
  groupEl.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';});
  groupEl.addEventListener('drop',e=>{
    e.preventDefault();
    if(!dragItem)return;
    const fromIdx=items.findIndex(i=>i.id===dragItem.id);
    if(fromIdx<0)return;
    const moved=items.splice(fromIdx,1)[0];
    const oldCat=moved.category;
    moved.category=cat;
    items.push(moved);
    renderItems();saveItemOrder();
    if(moved.category!==oldCat)db.collection('families').doc(familyName).collection('items').doc(moved.id).update({category:moved.category}).catch(()=>{});
  });
}
async function saveItemOrder(){
  for(let i=0;i<items.length;i++){
    try{
      await db.collection('families').doc(familyName).collection('items').doc(items[i].id).update({order:i});
    }catch(e){console.error(e);}
  }
}

function renderItems(){
  const filtered=activeFilter==='all'?items:items.filter(i=>i.category===activeFilter);
  document.getElementById('stat-total').textContent=items.length;
  document.getElementById('stat-done').textContent=items.filter(i=>i.checked).length;
  document.getElementById('stat-left').textContent=items.filter(i=>!i.checked).length;
  // rebuild filter chips
  const row=document.getElementById('filter-row');
  const clearBtn=row.querySelector('.clear-checked-btn');
  row.querySelectorAll('.filter-chip').forEach(c=>c.remove());
  const allChip=document.createElement('button');
  allChip.className='filter-chip'+(activeFilter==='all'?' active':'');
  allChip.dataset.cat='all';allChip.textContent='All';allChip.onclick=()=>setFilter('all');
  row.insertBefore(allChip,clearBtn);
  const usedCats=[...new Set(items.map(i=>i.category))];
  const orderedUsed=[...categoryOrder.filter(c=>usedCats.includes(c)),...usedCats.filter(c=>!categoryOrder.includes(c))];
  orderedUsed.forEach(cat=>{
    const chip=document.createElement('button');
    chip.className='filter-chip'+(activeFilter===cat?' active':'');
    chip.dataset.cat=cat;chip.textContent=cat;chip.onclick=()=>setFilter(cat);
    row.insertBefore(chip,clearBtn);
  });
  // build groups
  const groups={};
  orderedUsed.forEach(c=>groups[c]=[]);
  filtered.forEach(item=>{if(!groups[item.category])groups[item.category]=[];groups[item.category].push(item);});
  document.getElementById('empty-state').classList.toggle('show',filtered.length===0);
  const list=document.getElementById('items-list');
  list.innerHTML='';
  orderedUsed.forEach(cat=>{
    const catItems=groups[cat];
    if(!catItems||catItems.length===0)return;
    const sorted=[...catItems.filter(i=>!i.checked),...catItems.filter(i=>i.checked)];
    const group=document.createElement('div');
    group.className='category-group';
    group.dataset.cat=cat;
    const catIdx=categoryOrder.indexOf(cat);
    const canUp=catIdx>0;
    const canDown=catIdx<categoryOrder.length-1;
    const header=document.createElement('div');
    header.className='category-label';
    const escapedCat=esc(cat);
    header.innerHTML=
      '<div class="category-label-text">'+catEmoji(cat)+' '+escapedCat+'</div>'+
      '<div class="cat-actions">'+
      '<button class="cat-btn" title="Add item" onclick="promptAddToCategory(\u0027'+escapedCat+'\u0027)">'+
        '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>'+
      '</button>'+
      '<button class="cat-btn" title="Move up" '+(canUp?'':'disabled style="opacity:.3;cursor:default"')+' onclick="'+(canUp?'moveCatUp(\u0027'+escapedCat+'\u0027)':'')+'">'+
        '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 10 8 6 12 10"/></svg>'+
      '</button>'+
      '<button class="cat-btn" title="Move down" '+(canDown?'':'disabled style="opacity:.3;cursor:default"')+' onclick="'+(canDown?'moveCatDown(\u0027'+escapedCat+'\u0027)':'')+'">'+
        '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 6 8 10 12 6"/></svg>'+
      '</button>'+
      '<button class="cat-btn del" title="Delete category" onclick="confirmDeleteCategory(\u0027'+escapedCat+'\u0027)">'+
        '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>'+
      '</button>'+
      '</div>';
    group.appendChild(header);
    sorted.forEach(item=>{
      const card=document.createElement('div');
      card.className='item-card'+(item.checked?' checked':'');
      card.dataset.id=item.id;
      const check=document.createElement('div');check.className='item-check';if(item.checked)check.textContent='\u2713';check.onclick=()=>toggleItem(item.id);
      const info=document.createElement('div');info.className='item-info';
      info.innerHTML='<div class="item-name">'+esc(item.name)+'</div><div class="item-meta"><span>by '+esc(item.addedBy)+'</span><span>'+timeAgo(item.addedAt)+'</span></div>';
      const qty=document.createElement('div');qty.className='item-qty-badge';qty.textContent='\xD7'+item.qty;
      const del=document.createElement('button');del.className='item-delete';del.innerHTML='\u2715';del.onclick=()=>deleteItem(item.id);
      card.appendChild(check);card.appendChild(info);card.appendChild(qty);card.appendChild(del);
      makeDraggable(card,item);
      group.appendChild(card);
    });
    makeCatDropTarget(group,cat);
    list.appendChild(group);
  });
}

function timeAgo(iso){const d=Date.now()-new Date(iso);if(d<60000)return'just now';if(d<3600000)return`${Math.floor(d/60000)}m ago`;if(d<86400000)return`${Math.floor(d/3600000)}h ago`;return`${Math.floor(d/86400000)}d ago`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');}
function val(id){return document.getElementById(id)?.value||'';}
function hide(id){const el=document.getElementById(id);if(el)el.style.display='none';}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);}
function showError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),4000);}
setInterval(()=>{if(currentUser)loadItems();},30000);
</script>
